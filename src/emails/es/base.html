<!--
  Plantilla base de email en español.
  Todas las plantillas específicas heredan esta estructura.
  Redactada directamente en español peninsular, sin traducción.
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>{{EMAIL_SUBJECT}}</title>
  <style>
    body { margin: 0; padding: 0; background: #0b0b14; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #e8e8f0; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 32px 24px; }
    .brand { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: #ffffff; }
    .brand .moon { color: #a78bfa; }
    .tagline { font-size: 13px; color: #8a8aa0; margin-top: 2px; }
    .preheader { display: none; max-height: 0; overflow: hidden; opacity: 0; }
    .card { background: #15151f; border: 1px solid #2a2a3a; border-radius: 16px; padding: 28px; margin-top: 24px; }
    .h1 { font-size: 24px; line-height: 1.3; color: #ffffff; margin: 0 0 16px; }
    .p { font-size: 15px; line-height: 1.6; color: #c8c8d8; margin: 0 0 16px; }
    .tip { background: #1d1d2b; border-left: 3px solid #a78bfa; border-radius: 8px; padding: 14px 16px; font-size: 14px; color: #c8c8d8; margin: 16px 0; }
    .btn { display: inline-block; background: linear-gradient(135deg, #7c5cff, #a78bfa); color: #ffffff; text-decoration: none; font-size: 15px; font-weight: 600; padding: 14px 28px; border-radius: 999px; margin: 8px 0 20px; }
    .stats { display: table; width: 100%; margin: 16px 0; }
    .stat { display: table-cell; width: 50%; text-align: center; padding: 16px 8px; background: #1d1d2b; border-radius: 12px; }
    .stat .num { font-size: 22px; font-weight: 700; color: #ffffff; }
    .stat .lbl { font-size: 12px; color: #8a8aa0; margin-top: 4px; }
    .footer { margin-top: 32px; padding-top: 24px; border-top: 1px solid #2a2a3a; font-size: 12px; color: #6a6a80; line-height: 1.6; }
    .footer a { color: #8a8aa0; }
    .browser { font-size: 12px; color: #6a6a80; text-align: center; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">somna <span class="moon">🌙</span></div>
    <div class="tagline">Tu acompañante de sueño</div>

    <span class="preheader">{{EMAIL_PREHEADER}}</span>

    <div class="browser">{{EMAIL_VIEW_IN_BROWSER}}</div>

    <div class="card">
      <h1 class="h1">{{EMAIL_TITLE}}</h1>
      <p class="p">{{EMAIL_BODY}}</p>

      {{EMAIL_CONTENT}}

      <a href="{{EMAIL_CTA_URL}}" class="btn">{{EMAIL_CTA}}</a>
    </div>

    <div class="footer">
      {{EMAIL_FOOTER_TEXT}}<br>
      somna · Madrid, España<br>
      <a href="https://somna.help/es/privacy">{{EMAIL_PRIVACY}}</a> ·
      <a href="https://somna.help/es/terms">{{EMAIL_TERMS}}</a> ·
      <a href="{{EMAIL_UNSUBSCRIBE_URL}}">{{EMAIL_UNSUBSCRIBE}}</a><br>
      ¿Necesitas ayuda? Responde a este correo.
    </div>
  </div>
</body>
</html>
