# Somna.help Release Gate — automated production readiness validation.
#
# This workflow runs the full Release Gate on every push to main and on every
# pull request targeting main. It validates engineering quality, SEO, i18n,
# data integrity, security, and bundle health — but NEVER deploys.
#
# A production deployment is only allowed after this workflow passes AND a
# human reviews the generated release-report.md artifact.
#
# To deploy: merge to main (gate must be green), then run the deploy job
# manually via the GitHub Actions "Run workflow" button on the Deploy workflow.
name: Release Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual runs

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  # Wrangler dry-run needs no secrets — it only validates config, never deploys.
  CLOUDFLARE_ACCOUNT_ID: ""

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auto fix Prettier format
        run: npx prettier --write "src/**/*.{ts,tsx}" "docs/**/*.md"

      # ── Engineering Quality Gate ──────────────────────────────────────────
      - name: TypeScript Check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier Format Check
        run: npx prettier --check "src/**/*.{ts,tsx}" "docs/**/*.md"

      - name: Production Build
        run: npm run build

      - name: Wrangler Dry Run (write log to file to avoid ENOBUFS)
        run: |
          mkdir -p ci-logs
          # Run dry-run and send stdout/stderr to a file to avoid large in-memory pipes.
          set +e
          npx wrangler deploy --dry-run > ci-logs/wrangler-dry-run.log 2>&1
          WRANGLER_EXIT=$?
          set -e
          # Print a short tail so the job summary has context without blowing buffers.
          echo "==== Wrangler dry-run tail (last 200 lines) ===="
          tail -n 200 ci-logs/wrangler-dry-run.log
          # Fail on non-zero exit or if the output contains errors.
          if [ $WRANGLER_EXIT -ne 0 ]; then
            echo "Wrangler dry-run failed with exit code $WRANGLER_EXIT"
            cat ci-logs/wrangler-dry-run.log
            exit 1
          fi
          if grep -qi "error" ci-logs/wrangler-dry-run.log; then
            echo "Wrangler dry-run output contains errors — see ci-logs/wrangler-dry-run.log"
            cat ci-logs/wrangler-dry-run.log
            exit 1
          fi

      # ── Full Release Gate (SEO, i18n, security, data integrity, bundle) ───
      # This re-runs the engineering checks above (fast, cached) plus all the
      # structural gates. It also writes release-report.md.
      - name: Serve built site for crawler
        run: |
          mkdir -p ci-logs
          # Start a lightweight static server in the background. http-server is
          # not in package.json, so let npx install it automatically on CI.
          npx --yes http-server ./dist -p 3000 -c-1 > ci-logs/http-server.log 2>&1 &
          # Wait for the server to accept connections.
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:3000/ >/dev/null 2>&1; then
              echo "Server started"
              break
            fi
            echo "Waiting for server to start..."
            sleep 1
          done
          if ! curl -sSf http://127.0.0.1:3000/ >/dev/null 2>&1; then
            echo "Failed to start static server; see ci-logs/http-server.log"
            cat ci-logs/http-server.log || true
            exit 1
          fi

      - name: Run Release Gate
        run: npm run release:report

      # ── Quality Report Artifact ───────────────────────────────────────────
      - name: Upload release report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-report
          path: |
            release-report.md
            ci-logs/
          retention-days: 30

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
            !dist/**/*.map
          retention-days: 7

      # ── Gate Status Summary ───────────────────────────────────────────────
      - name: Gate summary
        if: always()
        run: |
          echo "## Release Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f release-report.md ]; then
            cat release-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Release gate did not produce a report." >> $GITHUB_STEP_SUMMARY
          fi
